<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Item Details - Online Rental System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a class="brand" href="/items">🏠 RentalSystem</a>
    <div>
        <a href="/items">All Items</a>
        <a href="/bookings/my-bookings">📋 My Bookings</a>
        <a href="/payments/my-payments">💳 My Payments</a>
        <form action="/logout" method="post" style="display:inline;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" style="background:none; border:none; color:white;
                                  cursor:pointer; font-size:14px; padding:8px 12px;
                                  border-radius:20px; transition:all 0.3s ease;">
        🚪 Logout
    </button>
</form>
    </div>
</nav>

<div class="container">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px; margin-top:20px;">

        <!-- Left: Image -->
        <div class="card" style="padding:0; overflow:hidden;">
            <div style="width:100%; height:350px; background:linear-gradient(135deg, #667eea, #764ba2);
                        display:flex; align-items:center; justify-content:center;">
                <img th:if="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                     th:src="${item.imageUrl}"
                     style="width:100%; height:350px; object-fit:cover;"
                     alt="Item Image"/>
                <span th:unless="${item.imageUrl != null and !item.imageUrl.isEmpty()}"
                      style="font-size:100px;"
                      th:text="${item.category.name() == 'VEHICLE'} ? '🚗' :
                               (${item.category.name() == 'HOUSE'} ? '🏠' :
                               (${item.category.name() == 'EQUIPMENT'} ? '🔧' : '📚'))">
                </span>
            </div>
        </div>

        <!-- Right: Details -->
        <div class="card">
            <span class="category-badge"
                  th:classappend="'badge-' + ${item.category}"
                  th:text="${item.category}">
            </span>

            <div th:if="${item.currentPrice > item.basePrice}"
                 class="demand-badge" style="margin-left:10px;">
                🔥 High Demand!
            </div>

            <h2 th:text="${item.name}"
                style="font-size:28px; margin:15px 0; color:#2c3e50;"></h2>

            <p th:text="${item.description}"
               style="color:#777; line-height:1.6; margin-bottom:20px;"></p>

            <!-- Pricing Box -->
            <div style="background:linear-gradient(135deg, #f8f9ff, #e8f4fd);
                        padding:20px; border-radius:15px; margin-bottom:20px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <p style="color:#777; font-size:13px;">Base Price</p>
                        <p style="font-size:16px; text-decoration:line-through; color:#999;">
                            ₹<span th:text="${item.basePrice}"></span>/day
                        </p>
                    </div>
                    <div style="text-align:right;">
                        <p style="color:#777; font-size:13px;">Current Price</p>
                        <p style="font-size:32px; font-weight:bold; color:#667eea;">
                            ₹<span th:text="${dynamicPrice}"></span>
                            <span style="font-size:16px; color:#777;">/day</span>
                        </p>
                    </div>
                </div>

                <div th:if="${dynamicPrice > item.basePrice}"
                     style="margin-top:10px; padding:8px 15px;
                            background:linear-gradient(135deg, #f5576c, #f093fb);
                            border-radius:10px; color:white; font-size:13px;">
                    ⚡ Price increased due to high demand!
                </div>
            </div>

            <!-- Availability -->
            <div style="margin-bottom:20px;">
                <span th:if="${item.available}" class="available-badge">
                    ✅ Available for Rent
                </span>
                <span th:unless="${item.available}" class="unavailable-badge">
                    ❌ Not Available
                </span>
            </div>

            <!-- Buttons -->
            <div th:if="${item.available}">
                <a th:href="@{/bookings/book/{id}(id=${item.id})}"
                   class="btn btn-success" style="width:100%; text-align:center; font-size:16px;">
                    📅 Book Now
                </a>
            </div>

            <a href="/items" class="btn btn-primary"
               style="width:100%; text-align:center; margin-top:10px;">
                ← Back to Items
            </a>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    <p>© 2026 RentalSystem. All rights reserved.</p>
</div>

</body>
</html>
