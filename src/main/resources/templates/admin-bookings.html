<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Bookings - Online Rental System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a class="brand" th:href="@{/admin/dashboard}">🏠 Admin Panel</a>
    <div>
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/users}">Users</a>
        <a th:href="@{/admin/bookings}">Bookings</a>
        <a th:href="@{/items/add}">Add Item</a>
        <a th:href="@{/items}">View Site</a>
       <form action="/logout" method="post" style="display:inline;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" style="background:none; border:none; color:white;
                                  cursor:pointer; font-size:14px; padding:8px 12px;
                                  border-radius:20px; transition:all 0.3s ease;">
        🚪 Logout
    </button>
</form>
    </div>
</nav>

<div class="container">
    <h2 style="margin-bottom:20px;">📋 Manage Bookings</h2>

    <!-- No Bookings -->
    <div th:if="${#lists.isEmpty(bookings)}" class="alert alert-danger">
        No bookings found!
    </div>

    <!-- Bookings Table -->
    <table th:unless="${#lists.isEmpty(bookings)}">
        <thead>
            <tr>
                <th>#</th>
                <th>User</th>
                <th>Item</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Total Price</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="booking : ${bookings}">
                <td th:text="${booking.id}"></td>
                <td th:text="${booking.user.name}"></td>
                <td th:text="${booking.item.name}"></td>
                <td th:text="${booking.startDate}"></td>
                <td th:text="${booking.endDate}"></td>
                <td>₹<span th:text="${booking.totalPrice}"></span></td>
                <td>
                    <span th:text="${booking.status}"
                          th:style="${booking.status.name() == 'CONFIRMED'} ? 
                                   'color:green; font-weight:bold'
                                   : (${booking.status.name() == 'CANCELLED'} ? 
                                   'color:red; font-weight:bold'
                                   : 'color:orange; font-weight:bold')">
                    </span>
                </td>
                <td>
                    <a th:if="${booking.status.name() == 'PENDING'}"
                       th:href="@{/admin/bookings/confirm/{id}(id=${booking.id})}"
                       class="btn btn-success">
                        Confirm
                    </a>
                    <a th:if="${booking.status.name() != 'CANCELLED' 
                               and booking.status.name() != 'COMPLETED'}"
                       th:href="@{/admin/bookings/cancel/{id}(id=${booking.id})}"
                       class="btn btn-danger"
                       onclick="return confirm('Are you sure?')">
                        Cancel
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
