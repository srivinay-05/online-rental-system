<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Item - Online Rental System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a class="brand" th:href="@{/admin/dashboard}">🏠 Admin Panel</a>
    <div>
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/users}">Users</a>
        <a th:href="@{/admin/bookings}">Bookings</a>
        <a th:href="@{/items/add}">Add Item</a>
        <a th:href="@{/items}">View Site</a>
       <form action="/logout" method="post" style="display:inline;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" style="background:none; border:none; color:white;
                                  cursor:pointer; font-size:14px; padding:8px 12px;
                                  border-radius:20px; transition:all 0.3s ease;">
        🚪 Logout
    </button>
</form>
    </div>
</nav>

<div class="container">
    <div class="card" style="max-width:600px; margin:0 auto;">
        <h2>➕ Add New Item</h2>

        <form th:action="@{/items/add}" method="post" th:object="${item}">

            <div class="form-group">
                <label>Item Name</label>
                <input type="text" th:field="*{name}" 
                       placeholder="Enter item name" required/>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" 
                          placeholder="Enter item description" 
                          rows="3" required
                          style="width:100%; padding:10px; border:1px solid #ddd; 
                                 border-radius:5px; font-size:14px;"></textarea>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select th:field="*{category}" required>
                    <option value="">Select Category</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat}"
                            th:text="${cat}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Base Price (₹ per day)</label>
                <input type="number" th:field="*{basePrice}" 
                       placeholder="Enter base price" 
                       min="0" step="0.01" required/>
            </div>

            <div class="form-group">
                <label>Image URL (optional)</label>
                <input type="text" th:field="*{imageUrl}" 
                       placeholder="Enter image URL"/>
            </div>

            <button type="submit" class="btn btn-success" style="width:100%;">
                ➕ Add Item
            </button>
        </form>

        <a th:href="@{/items}" class="btn btn-primary" 
           style="width:100%; text-align:center; margin-top:10px;">
            ← Back to Items
        </a>
    </div>
</div>

</body>
</html>
