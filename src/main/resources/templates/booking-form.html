<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Item - Online Rental System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a class="brand" th:href="@{/items}">🏠 RentalSystem</a>
    <div>
        <a th:href="@{/items}">All Items</a>
        <a th:href="@{/bookings/my-bookings}">My Bookings</a>
        <form action="/logout" method="post" style="display:inline;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" style="background:none; border:none; color:white;
                                  cursor:pointer; font-size:14px; padding:8px 12px;
                                  border-radius:20px; transition:all 0.3s ease;">
        🚪 Logout
    </button>
</form>
    </div>
</nav>

<div class="container">
    <div class="card" style="max-width:600px; margin:0 auto;">
        <h2>📅 Book Item</h2>

        <!-- Item Summary -->
        <div style="background:#f9f9f9; padding:15px; border-radius:8px; margin:15px 0;">
            <h3 th:text="${item.name}"></h3>
            <span class="category" th:text="${item.category}"></span>
            <p style="margin-top:10px;">
                Current Price: 
                <strong style="color:#27ae60;">
                    ₹<span th:text="${dynamicPrice}"></span>/day
                </strong>
            </p>
            <div th:if="${dynamicPrice > item.basePrice}"
                 style="color:#e74c3c; font-size:13px; margin-top:5px;">
                🔥 High Demand Pricing Applied!
            </div>
        </div>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <!-- Booking Form -->
        <form th:action="@{/bookings/book/{id}(id=${item.id})}" 
              method="post" th:object="${booking}">

            <div class="form-group">
                <label>Start Date</label>
                <input type="date" th:field="*{startDate}" required
                       th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"/>
            </div>

            <div class="form-group">
                <label>End Date</label>
                <input type="date" th:field="*{endDate}" required/>
            </div>

            <!-- Price Calculator -->
            <div style="background:#e8f8f0; padding:15px; border-radius:8px; margin:15px 0;">
                <p style="color:#27ae60; font-weight:bold;">
                    💡 Total price will be calculated automatically based on number of days.
                </p>
            </div>

            <button type="submit" class="btn btn-success" style="width:100%;">
                ✅ Confirm Booking
            </button>
        </form>

        <a th:href="@{/items/{id}(id=${item.id})}" class="btn btn-primary" 
           style="width:100%; text-align:center; margin-top:10px;">
            ← Back to Item
        </a>
    </div>
</div>

</body>
</html>
