<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Online Rental System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh;">

<div class="auth-container">

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:20px;">
        <span style="font-size:50px;">🏠</span>
        <h2 style="color:white; margin-top:10px;">RentalSystem</h2>
        <p style="color:rgba(255,255,255,0.8);">Your trusted rental platform</p>
    </div>

    <div class="auth-card">
        <h2>🔑 Welcome Back!</h2>

        <!-- Error Message -->
        <div th:if="${param.error}" class="alert alert-danger">
            ❌ Invalid email or password!
        </div>

        <!-- Logout Message -->
        <div th:if="${param.logout}" class="alert alert-success">
            ✅ You have been logged out successfully!
        </div>

        <!-- Registered Message -->
        <div th:if="${param.registered}" class="alert alert-success">
            ✅ Registration successful! Please login.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" name="username"
                       placeholder="Enter your email" required/>
            </div>
            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" name="password"
                       placeholder="Enter your password" required/>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; font-size:16px;">
                Login →
            </button>
        </form>

        <div class="auth-link">
            Don't have an account?
            <a th:href="@{/register}">Register here</a>
        </div>
    </div>
</div>

</body>
</html>
