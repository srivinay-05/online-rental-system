<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Online Rental System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height:100vh;">

<div class="auth-container">

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:20px;">
        <span style="font-size:50px;">🏠</span>
        <h2 style="color:white; margin-top:10px;">RentalSystem</h2>
        <p style="color:rgba(255,255,255,0.8);">Create your account today!</p>
    </div>

    <div class="auth-card">
        <h2>📝 Create Account</h2>

        <!-- Error Message -->
        <div th:if="${error}" class="alert alert-danger">
            ❌ <span th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" method="post" th:object="${user}">

            <div class="form-group">
                <label>👤 Full Name</label>
                <input type="text" th:field="*{name}"
                       placeholder="Enter your full name"/>
                <small th:if="${#fields.hasErrors('name')}"
                       th:errors="*{name}"
                       style="color:red; font-size:12px;">
                </small>
            </div>

            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" th:field="*{email}"
                       placeholder="Enter your email"/>
                <small th:if="${#fields.hasErrors('email')}"
                       th:errors="*{email}"
                       style="color:red; font-size:12px;">
                </small>
            </div>

            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" th:field="*{password}"
                       placeholder="Minimum 6 characters"/>
                <small th:if="${#fields.hasErrors('password')}"
                       th:errors="*{password}"
                       style="color:red; font-size:12px;">
                </small>
            </div>

            <div class="form-group">
                <label>📱 Phone</label>
                <input type="text" th:field="*{phone}"
                       placeholder="10 digit phone number"/>
                <small th:if="${#fields.hasErrors('phone')}"
                       th:errors="*{phone}"
                       style="color:red; font-size:12px;">
                </small>
            </div>

            <button type="submit" class="btn btn-success"
                    style="width:100%; font-size:16px;">
                Create Account →
            </button>
        </form>

        <div class="auth-link">
            Already have an account?
            <a th:href="@{/login}">Login here</a>
        </div>
    </div>
</div>

</body>
</html>
