<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile - Online Rental System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a class="brand" th:href="@{/items}">🏠 RentalSystem</a>
    <div>
        <a th:href="@{/items}">All Items</a>
        <a th:href="@{/bookings/my-bookings}">My Bookings</a>
        <form action="/logout" method="post" style="display:inline;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" style="background:none; border:none; color:white;
                                  cursor:pointer; font-size:14px; padding:8px 12px;
                                  border-radius:20px; transition:all 0.3s ease;">
        🚪 Logout
    </button>
</form>
    </div>
</nav>

<div class="container">
    <div class="card" style="max-width:600px; margin:0 auto;">
        <h2>👤 My Profile</h2>

        <!-- Success Message -->
        <div th:if="${param.updated}" class="alert alert-success">
            Profile updated successfully!
        </div>

        <form th:action="@{/profile/{id}(id=${user.id})}"
              method="post" th:object="${user}">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" th:field="*{name}" placeholder="Enter your full name"/>
                <small th:if="${#fields.hasErrors('name')}"
                       th:errors="*{name}"
                       style="color:red;">
                </small>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" readonly
                       style="background:#f5f5f5; cursor:not-allowed;"/>
                <small style="color:#777;">Email cannot be changed</small>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" th:field="*{phone}" placeholder="10 digit phone number"/>
                <small th:if="${#fields.hasErrors('phone')}"
                       th:errors="*{phone}"
                       style="color:red;">
                </small>
            </div>

            <div class="form-group">
                <label>Role</label>
                <input type="text" th:value="${user.role}"
                       readonly style="background:#f5f5f5; cursor:not-allowed;"/>
            </div>

            <div class="form-group">
                <label>Member Since</label>
                <input type="text"
                       th:value="${#temporals.format(user.createdAt, 'dd-MM-yyyy')}"
                       readonly style="background:#f5f5f5; cursor:not-allowed;"/>
            </div>

            <button type="submit" class="btn btn-success" style="width:100%;">
                💾 Update Profile
            </button>
        </form>

        <a th:href="@{/items}" class="btn btn-primary"
           style="width:100%; text-align:center; margin-top:10px;">
            ← Back to Items
        </a>
    </div>
</div>

</body>
</html>
