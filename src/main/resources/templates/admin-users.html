<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Users - Online Rental System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a class="brand" th:href="@{/admin/dashboard}">🏠 Admin Panel</a>
    <div>
        <a th:href="@{/admin/dashboard}">Dashboard</a>
        <a th:href="@{/admin/users}">Users</a>
        <a th:href="@{/admin/bookings}">Bookings</a>
        <a th:href="@{/items/add}">Add Item</a>
        <a th:href="@{/items}">View Site</a>
       <form action="/logout" method="post" style="display:inline;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" style="background:none; border:none; color:white;
                                  cursor:pointer; font-size:14px; padding:8px 12px;
                                  border-radius:20px; transition:all 0.3s ease;">
        🚪 Logout
    </button>
</form>
    </div>
</nav>

<div class="container">
    <h2 style="margin-bottom:20px;">👥 Manage Users</h2>

    <!-- No Users -->
    <div th:if="${#lists.isEmpty(users)}" class="alert alert-danger">
        No users found!
    </div>

    <!-- Users Table -->
    <table th:unless="${#lists.isEmpty(users)}">
        <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Role</th>
                <th>Joined</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.name}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.phone}"></td>
                <td>
                    <span th:text="${user.role}"
                          th:style="${user.role.name() == 'ADMIN'} ? 
                                   'color:red; font-weight:bold' : 
                                   'color:green; font-weight:bold'">
                    </span>
                </td>
                <td th:text="${#temporals.format(user.createdAt, 'dd-MM-yyyy')}"></td>
                <td>
                    <a th:if="${user.role.name() != 'ADMIN'}"
                    th:href="@{/admin/users/make-admin/{id}(id=${user.id})}"
                    class="btn btn-warning"
                    onclick="return confirm('Make this user an Admin?')">
    Make Admin
                 </a>
               <a th:if="${user.role.name() != 'ADMIN'}"
                  th:href="@{/admin/users/delete/{id}(id=${user.id})}"
                 class="btn btn-danger"
                 onclick="return confirm('Are you sure you want to delete this user?')">
    Delete
                  </a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
